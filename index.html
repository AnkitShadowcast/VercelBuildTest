<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Convai</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <script src="TemplateData/ConvaiWebGLSDK.js"></script>

    <!-- Firebase Compat SDKs (IMPORTANT: compat version only) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <script>
        // 🔥 Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyD9KBUKPAcb-Jv4xLvYy3KeaQrq8EpW2lg",
            authDomain: "wyntrr-conversation.firebaseapp.com",
            projectId: "wyntrr-conversation",
            storageBucket: "wyntrr-conversation.firebasestorage.app",
            messagingSenderId: "339422043036",
            appId: "1:339422043036:web:5bc6c2599132be42fac659"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 🔐 Called from Unity (via .jslib)
        window.StartGoogleLogin = function () {
            console.log("Starting Google Login...");

            auth.signInWithPopup(provider)
                .then((result) => {
                    const user = result.user;
                    const userData = {
                        name: user.displayName,
                        email: user.email,
                        picture: user.photoURL,
                        uid: user.uid
                    };

                    // 💾 Save user to localStorage for reload persistence
                    localStorage.setItem("wyntrr_user", JSON.stringify(userData));

                    console.log("Login Success:", userData);
                    sendUserToUnity(JSON.stringify(userData));
                })
                .catch((error) => {
                    console.error("Login Failed:", error);
                });
        };

        // 📤 Helper to send user data to Unity
        function sendUserToUnity(userDataJson) {
            if (window.unityInstance) {
                window.unityInstance.SendMessage(
                    "GoogleAuthHandler",
                    "OnGoogleLogin",
                    userDataJson
                );
            } else {
                console.error("Unity instance not ready.");
            }
        }

        // 🔄 On reload: restore saved user automatically
        function tryRestoreSavedUser() {
            const savedUser = localStorage.getItem("wyntrr_user");
            if (savedUser) {
                console.log("Restoring saved user...");
                // Poll until Unity is ready
                const interval = setInterval(function () {
                    if (window.unityInstance) {
                        clearInterval(interval);
                        sendUserToUnity(savedUser);
                    }
                }, 500);
            }
        }
    </script>
</head>

<body>
<div id="unity-container">
    <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
    <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>
    <div id="unity-warning"></div>
</div>

<script>
    //window.addEventListener("load", function () {
    //    if ("serviceWorker" in navigator) {
    //        navigator.serviceWorker.register("ServiceWorker.js");
    //    }
    //});

    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
            warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
            if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
            setTimeout(function () {
                warningBanner.removeChild(div);
                updateBannerVisibility();
            }, 5000);
        }
        updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/Wyntrr.loader.js"

    var config = {
        dataUrl: buildUrl + "/Wyntrr.data"
        frameworkUrl: buildUrl + "/Wyntrr.framework.js",
        codeUrl: buildUrl + "/Wyntrr.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
    productName: "Convai",
    productVersion: "2",
    showBanner: unityShowBanner,
    };

    loadingBar.style.display = "block";

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
            window.unityInstance = unityInstance; // 🔥 Important
            loadingBar.style.display = "none";

            // 🔄 Try to restore saved user after Unity is ready
            tryRestoreSavedUser();

        }).catch((message) => {
            alert(message);
        });
    };
    document.body.appendChild(script);
</script>
</body>
</html>
